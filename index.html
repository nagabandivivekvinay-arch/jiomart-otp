<!DOCTYPE html>
<html>
<head>

<title>JioMart Delivery OTP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:20px;
text-align:center;
color:white;
}

.container{
background:white;
padding:25px;
border-radius:12px;
max-width:420px;
margin:auto;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
color:#333;
}

input{
width:90%;
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
border:none;
padding:10px 22px;
border-radius:25px;
cursor:pointer;
}

.deleteBtn{
background:#ff4b2b;
}

table{
width:95%;
margin:auto;
margin-top:20px;
border-collapse:collapse;
background:white;
color:black;
}

th{
background:#1a237e;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

.pendingRow{
background:#ffe5e5;
}

.latest{
background:#fff9c4;
}

.summary{
background:white;
color:black;
padding:12px;
margin-top:15px;
border-radius:8px;
width:320px;
margin-left:auto;
margin-right:auto;
font-weight:bold;
}

.searchBox{
margin-top:15px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h1>JioMart Delivery OTP</h1>

<div class="container">

<input id="adminPass" placeholder="Admin Password">

<button onclick="loginAdmin()">Admin Login</button>

<div id="adminPanel" class="hidden">

<input id="name" placeholder="Delivery Person Name">

<input id="otp" maxlength="4"
oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4); autoSubmit();">

<input id="amount" placeholder="Order Amount">

<button onclick="addOTP()">Submit OTP</button>

</div>

</div>

<div class="searchBox">
<input id="search" placeholder="Search delivery person..." onkeyup="filterTable()">
</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>OTP</th>
<th>Payment</th>
<th>Amount</th>
<th>Time</th>
<th id="actionHead" class="hidden">Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<div class="summary">
Total Orders: <span id="totalOrders">0</span><br>
Total Paid: ₹ <span id="totalPaid">0</span><br>
Total Pending: ₹ <span id="totalPending">0</span>
</div>

<script>

const ADMIN_PASSWORD="1122";

const firebaseConfig={
apiKey:"AIzaSyBRTE1x8G_aLqW2tn6Y5BPD1vBdsMlWWV8",
authDomain:"jiomart-otp.firebaseapp.com",
databaseURL:"https://jiomart-otp-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"jiomart-otp",
storageBucket:"jiomart-otp.firebasestorage.app",
messagingSenderId:"673199354644",
appId:"1:673199354644:web:572645d6b479d239b90801"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database().ref("otp");

let isAdmin=false;

function loginAdmin(){

let pass=document.getElementById("adminPass").value;

if(pass===ADMIN_PASSWORD){

isAdmin=true;

document.getElementById("adminPanel").classList.remove("hidden");
document.getElementById("actionHead").classList.remove("hidden");

alert("Admin Mode Enabled");

}else{

alert("Wrong Password");

}

}

function autoSubmit(){
let otp=document.getElementById("otp").value;
if(otp.length===4){
addOTP();
}
}

function addOTP(){

if(!isAdmin) return;

let name=document.getElementById("name").value;
let otp=document.getElementById("otp").value;
let amount=parseFloat(document.getElementById("amount").value||0);

if(!/^\d{4}$/.test(otp)) return;

let time=new Date().toLocaleString();

db.push({
name:name,
otp:otp,
amount:amount,
payment:false,
time:time,
timestamp:Date.now()
});

document.getElementById("name").value="";
document.getElementById("otp").value="";
document.getElementById("amount").value="";

}

function togglePayment(id,current){

if(!isAdmin) return;

firebase.database().ref("otp/"+id).update({
payment:!current
});

}

function deleteData(id){

if(!isAdmin) return;

if(confirm("Delete this order?")){
firebase.database().ref("otp/"+id).remove();
}

}

function copyOTP(val){
navigator.clipboard.writeText(val);
alert("OTP copied");
}

function filterTable(){

let value=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll("#table tr");

rows.forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(value)?"":"none";
});

}

db.orderByChild("timestamp").on("value",function(snapshot){

let data=snapshot.val();
let arr=[];
let totalOrders=0;
let totalPaid=0;
let totalPending=0;

for(let id in data){
arr.push({id:id,...data[id]});
}

arr.reverse();

let html="";

arr.forEach((d,index)=>{

totalOrders++;

if(d.payment){
totalPaid+=Number(d.amount);
}else{
totalPending+=Number(d.amount);
}

let rowClass=d.payment?"":"pendingRow";
if(index===0) rowClass+=" latest";

html+=`
<tr class="${rowClass}">
<td>${d.name}</td>
<td>${d.otp} <button onclick="copyOTP('${d.otp}')">Copy</button></td>
<td>
<input type="checkbox" ${d.payment?'checked':''}
onclick="togglePayment('${d.id}',${d.payment})">
</td>
<td>₹ ${d.amount}</td>
<td>${d.time}</td>
${isAdmin?`<td><button class="deleteBtn" onclick="deleteData('${d.id}')">Delete</button></td>`:""}
</tr>
`;

});

document.getElementById("table").innerHTML=html;

document.getElementById("totalOrders").innerText=totalOrders;
document.getElementById("totalPaid").innerText=totalPaid;
document.getElementById("totalPending").innerText=totalPending;

});

</script>

</body>
</html>
