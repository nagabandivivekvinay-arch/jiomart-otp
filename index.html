<!DOCTYPE html>
<html>
<head>

<title>JioMart Delivery OTP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:20px;
text-align:center;
color:white;
}

.container{
background:white;
padding:25px;
border-radius:12px;
max-width:420px;
margin:auto;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
color:#333;
}

input{
width:90%;
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
border:none;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
margin:3px;
}

.deleteBtn{background:#ff4b2b;}
.editBtn{background:#28a745;}

table{
width:95%;
margin:auto;
margin-top:20px;
border-collapse:collapse;
background:white;
color:black;
}

th{
background:#1a237e;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

.pendingRow{background:#ffe5e5;}
.latest{background:#fff9c4;}

.summary{
background:white;
color:black;
padding:12px;
margin-top:15px;
border-radius:8px;
width:340px;
margin-left:auto;
margin-right:auto;
font-weight:bold;
}

.hidden{display:none;}
.filterButtons{margin-top:10px;}

</style>

</head>

<body>

<h1>JioMart Delivery OTP</h1>

<div class="container">

<input id="adminPass" placeholder="Admin Password">
<button onclick="loginAdmin()">Admin Login</button>

<div id="adminPanel" class="hidden">

<input id="name" placeholder="Delivery Person Name">

<input id="otp" placeholder="Enter OTP" maxlength="4"
oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)">

<input id="amount" placeholder="Enter Amount" maxlength="3"
oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,3); autoSubmit();">

</div>

</div>

<div class="filterButtons">
<button onclick="setFilter('today')">Today</button>
<button onclick="setFilter('yesterday')">Yesterday</button>
<button onclick="setFilter('all')">All Orders</button>
</div>

<input id="search" placeholder="Search delivery person..." onkeyup="filterTable()">

<table>

<thead>
<tr>
<th>Name</th>
<th>OTP</th>
<th>Payment</th>
<th>Amount</th>
<th>Delivered</th>
<th>Time</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<div class="summary">
Total Orders: <span id="totalOrders">0</span><br>
Total Paid: ₹ <span id="totalPaid">0</span><br>
Total Pending: ₹ <span id="totalPending">0</span>
</div>

<script>

const ADMIN_PASSWORD="1122";
let currentFilter="all";

const firebaseConfig={
apiKey:"AIzaSyBRTE1x8G_aLqW2tn6Y5BPD1vBdsMlWWV8",
authDomain:"jiomart-otp.firebaseapp.com",
databaseURL:"https://jiomart-otp-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"jiomart-otp",
storageBucket:"jiomart-otp.firebasestorage.app",
messagingSenderId:"673199354644",
appId:"1:673199354644:web:572645d6b479d239b90801"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database().ref("otp");

let isAdmin=false;

function loginAdmin(){

let pass=document.getElementById("adminPass").value;

if(pass===ADMIN_PASSWORD){

isAdmin=true;
document.getElementById("adminPanel").classList.remove("hidden");
alert("Admin Mode Enabled");

loadData();

}else{

alert("Wrong Password");

}

}

function autoSubmit(){

let otp=document.getElementById("otp").value;
let amount=document.getElementById("amount").value;

if(otp.length===4 && amount.length===3){
addOTP();
}

}

function addOTP(){

if(!isAdmin) return;

let name=document.getElementById("name").value;
let otp=document.getElementById("otp").value;
let amount=parseFloat(document.getElementById("amount").value||0);

let now=new Date();
let time=now.toLocaleString();
let date=now.toISOString().split('T')[0];

db.push({
name:name,
otp:otp,
amount:amount,
payment:false,
delivered:false,
time:time,
date:date,
timestamp:Date.now()
});

document.getElementById("name").value="";
document.getElementById("otp").value="";
document.getElementById("amount").value="";

}

function setFilter(type){
currentFilter=type;
loadData();
}

function togglePayment(id,current){

if(!isAdmin) return;

firebase.database().ref("otp/"+id).update({
payment:!current
});

}

function toggleDelivered(id,current){

if(!isAdmin) return;

firebase.database().ref("otp/"+id).update({
delivered:!current
});

}

function deleteData(id){

if(!isAdmin) return;

if(confirm("Delete this order?")){
firebase.database().ref("otp/"+id).remove();
}

}

function editData(id,name,otp,amount){

if(!isAdmin) return;

let newName=prompt("Edit Name",name);
let newOTP=prompt("Edit OTP",otp);
let newAmount=prompt("Edit Amount",amount);

firebase.database().ref("otp/"+id).update({
name:newName,
otp:newOTP,
amount:newAmount
});

}

function filterTable(){

let value=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll("#table tr");

rows.forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(value)?"":"none";
});

}

function loadData(){

db.orderByChild("timestamp").once("value",function(snapshot){

let data=snapshot.val();
let arr=[];
let totalOrders=0;
let totalPaid=0;
let totalPending=0;

for(let id in data){
arr.push({id:id,...data[id]});
}

arr.reverse();

let html="";

arr.forEach((d,index)=>{

if(currentFilter==="today"){
let today=new Date().toISOString().split('T')[0];
if(d.date!==today) return;
}

if(currentFilter==="yesterday"){
let d1=new Date();
d1.setDate(d1.getDate()-1);
let y=d1.toISOString().split('T')[0];
if(d.date!==y) return;
}

totalOrders++;

if(d.delivered){
totalPaid += Number(d.amount);
}else{
totalPending += Number(d.amount);
}

let rowClass=d.delivered?"":"pendingRow";
if(index===0) rowClass+=" latest";

html+=`
<tr class="${rowClass}">
<td>${d.name}</td>
<td>${d.otp}</td>
<td>
<input type="checkbox" ${d.payment?'checked':''} ${!isAdmin?'disabled':''}
onclick="togglePayment('${d.id}',${d.payment})">
</td>
<td>₹ ${d.amount}</td>
<td>
<input type="checkbox" ${d.delivered?'checked':''} ${!isAdmin?'disabled':''}
onclick="toggleDelivered('${d.id}',${d.delivered})">
</td>
<td>${d.time}</td>
<td>
${isAdmin?`
<button class="editBtn" onclick="editData('${d.id}','${d.name}','${d.otp}','${d.amount}')">Edit</button>
<button class="deleteBtn" onclick="deleteData('${d.id}')">Delete</button>
`:'-'}
</td>
</tr>
`;

});

document.getElementById("table").innerHTML=html;

document.getElementById("totalOrders").innerText=totalOrders;
document.getElementById("totalPaid").innerText=totalPaid;
document.getElementById("totalPending").innerText=totalPending;

});

}

db.on("value",loadData);

</script>

</body>
</html>
